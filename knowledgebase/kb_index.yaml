# Mathematical family groupings
families:
  foundations:
    description: "Foundational mathematics - logic, sets, orders"
    members: ["set_theory", "order_theory", "arithmetic", "logic_model_theory"]

  algebra:
    description: "Algebraic structures and their properties"
    members: ["linear_algebra", "isomorphism_theorems", "group_theory", "galois_theory", "representation_theory", "category_theory", "homological_algebra", "commutative_algebra", "lie_theory", "algebraic_number_theory", "algebraic_geometry", "k_theory"]

  analysis:
    description: "Real and complex analysis, measure theory, functional analysis"
    members: ["real_complex_analysis", "measure_theory", "probability_theory", "functional_analysis", "fourier_analysis", "stochastic_processes", "convex_analysis", "operator_theory", "operator_algebras", "numerical_analysis", "calculus_of_variations", "special_functions", "statistics"]

  dynamics:
    description: "Dynamical systems, ergodic theory, and differential equations"
    members: ["ergodic_theory", "ordinary_differential_equations", "partial_differential_equations"]

  topology:
    description: "General and algebraic topology"
    members: ["topology", "algebraic_topology"]

  geometry:
    description: "Classical, differential, and algebraic geometry"
    members: ["classical_geometry", "smooth_manifolds", "differential_geometry", "riemannian_geometry", "fiber_bundles", "algebraic_geometry", "symplectic_geometry", "complex_geometry", "sheaf_theory"]

  discrete:
    description: "Discrete mathematics and number theory"
    members: ["graph_theory", "prime_number_theorems", "combinatorics", "ramsey_theory", "computability_theory", "additive_combinatorics", "p_adic_numbers", "coding_theory", "information_theory"]

